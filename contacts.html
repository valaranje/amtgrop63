<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Контакты AMT-GROUP — телефон, email, адрес офиса в Самаре. Оставьте заявку на аренду оборудования.">
  <meta name="theme-color" content="#FAFAF8">
  <title>Контакты — AMT-GROUP</title>
  <link rel="stylesheet" href="assets/css/main.css">
  <link rel="icon" href="assets/icons/favicon.svg" type="image/svg+xml">
</head>
<body data-page="contacts">
  <div id="site-header"></div>

  <main>
    <section class="page-hero">
      <div class="container">
        <div class="fade-in">
          <span class="section-label">Контакты</span>
          <h1 class="page-hero__title">Свяжитесь с нами</h1>
          <p class="page-hero__description">Заполните форму или позвоните — мы ответим в ближайшее время.</p>
        </div>
      </div>
    </section>

    <section class="page-content">
      <div class="container">
        <div class="about-grid">
          <div id="contact-form-section" class="fade-in"></div>
          <div class="fade-in fade-in--delay-1">
            <div id="contact-info-section" style="margin-bottom: 32px"></div>
            <div class="map">
              <iframe
                id="contact-map"
                src="about:blank"
                title="Карта — офис AMT-GROUP"
                loading="lazy"
                allowfullscreen>
              </iframe>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div id="site-footer"></div>

  <script type="module" src="assets/js/main.js"></script>
</body>
</html>
